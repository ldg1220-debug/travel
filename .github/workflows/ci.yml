name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      # `npm run build` also runs the DB migration script first (it needs a
      # live DATABASE_URL), which CI doesn't have — call `next build`
      # directly instead. Every server-only env var degrades gracefully at
      # runtime by design (see .env.example), so a build with none set
      # still catches type/lint/build regressions, just not "is the DB
      # reachable" — that part is out of scope for this job.
      - name: Build
        run: npx next build
